<!DOCTYPE html>
<html>
<head>
  <title>Personal AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      text-align: center;
    }

    #chat {
      width: 100%;
      max-width: 600px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid gray;
      padding: 10px;
      background: black;
      margin-bottom: 10px;
      border-radius: 15px;
    }

    .bubble {
      margin: 5px 0;
      padding: 10px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #222;
      align-self: flex-end;
      text-align: right;
    }

    .ai {
      background: #333;
      align-self: flex-start;
      text-align: left;
    }

    #input-container {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    #msg {
      width: 100%;
      padding: 12px 50px 12px 20px; /* leave space for send button */
      border-radius: 25px;
      border: none;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }

    #send-btn {
      position: absolute;
      left: 5px;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn svg {
      width: 20px;
      height: 20px;
      fill: black;
    }
  </style>
</head>
<body>
  <h2>Personal AI Chat</h2>
  <div id="chat"></div>

  <div id="input-container">
    <input id="msg" placeholder="Type message...">
    <button id="send-btn" onclick="send()">
      <!-- Upwards arrow -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2L5 9h4v7h6V9h4z"/>
      </svg>
    </button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const msgBox = document.getElementById("msg");
    let thinkingInterval;

    function send() {
      const text = msgBox.value.trim();
      if (!text) return;

      chat.innerHTML += `<div class="bubble user"><b>You:</b> ${text}</div>`;
      msgBox.value = "";

      const thinkingDiv = document.createElement("div");
      thinkingDiv.className = "bubble ai";
      thinkingDiv.innerHTML = "<b>AI:</b> Thinking.";
      chat.appendChild(thinkingDiv);
      chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });

      // Animate "Thinking..."
      let dots = 1;
      thinkingInterval = setInterval(() => {
        dots = dots < 3 ? dots + 1 : 1;
        thinkingDiv.innerHTML = `<b>AI:</b> Thinking${'.'.repeat(dots)}`;
        chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
      }, 500);

      fetch("https://aichat.isaazizi1234.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      })
      .then(res => res.json())
      .then(data => {
        clearInterval(thinkingInterval);
        thinkingDiv.innerHTML = `<b>AI:</b> ${data.reply}`;
        chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
      })
      .catch(err => {
        clearInterval(thinkingInterval);
        thinkingDiv.innerHTML = "<b>AI:</b> Connection error";
        console.error(err);
      });
    }
  </script>
</body>
</html>
